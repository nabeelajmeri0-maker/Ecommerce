<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <section class="auth-wrapper">
    <div class="auth-main-container">
        <div class="auth-box border-right">
            <h1>Sign Up</h1>
            <p class="subtitle">Join our community today</p>
            <div class="input-group">
                <input type="email" id="semail" placeholder="Email Address">
                <input type="password" id="spassword" placeholder="Password">
            </div>
            <button class="btn-auth signup-btn" id="signupBtn">Create Account</button>
        </div>

        <div class="divider">OR</div>

        <div class="auth-box">
            <h1>Login</h1>
            <p class="subtitle">Welcome back to E-Shop</p>
            <div class="input-group">
                <input type="email" id="lemail" placeholder="Email Address">
                <input type="password" id="lpassword" placeholder="Password">
            </div>
            <button class="btn-auth login-btn" id="loginBtn">Login Now</button>
        </div>
    </div>
</section>
    <script src="./app.js" type="module"></script>
</body>
</html>
